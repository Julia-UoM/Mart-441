<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Virtual ViewMaster - Social Justice Around the World</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Virtual ViewMaster</h1>
  <h2>Social Justice Around the World</h2>

  <div id="viewer">

    <img id="slideImage" src="" alt="Social Justice Image">

    <h3 id="slideTitle">Title will appear here</h3>

    <p id="slideDescription">
      Description will appear here.
    </p>

    <p>
      <strong>Author:</strong> <span id="slideAuthor"></span><br>
      <strong>Year:</strong> <span id="slideYear"></span>
    </p>

  </div>

  <button id="nextButton">View Next Slide</button>

  <script src="script.js"></script>

</body>
</html>
