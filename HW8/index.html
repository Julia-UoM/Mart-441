<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Virtual ViewMaster - Social Justice Around the World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Virtual ViewMaster</h1>
  <h2>Social Justice Around the World</h2>

  <div id="viewer">
    <img id="slideImage" src="" alt="Social justice slide">
    <h3 id="slideTitle">Title goes here</h3>
    <p id="slideDescription">Description goes here.</p>
    <p id="slideMeta">
      <span id="slideAuthor">Author</span> |
      <span id="slideYear">Year</span>
    </p>
  </div>

  <button id="nextButton">View Next Slide</button>

  <script src="script.js"></script>
</body>
</html>
