<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Homework 14</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style>
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script>
/*
Added features:
1. Spacebar jump instead of up arrow
2. Individual gravity for each star
3. Added spikes hazard that penalizes and resets the player
4. Added a second collectible with a different point value
5. Added more platforms to change the level layout
*/

var player;
var stars;
var gems;
var spikes;
var platforms;
var cursors;
var spaceKey;
var score = 0;
var scoreText;
var messageText;
var gameOver = false;

var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 400 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

var game = new Phaser.Game(config);

function preload ()
{
    this.load.image('sky', 'assets/sky.png');
    this.load.image('ground', 'assets/platform.png');
    this.load.image('star', 'assets/star.png');
    this.load.image('bomb', 'assets/bomb.png');
    this.load.spritesheet('dude', 'assets/dude.png', {
        frameWidth: 32,
        frameHeight: 48
    });
}

function create ()
{
    this.add.image(400, 300, 'sky');

    platforms = this.physics.add.staticGroup();

    // ground
    platforms.create(400, 568, 'ground').setScale(2).refreshBody();

    // easy staircase layout
    platforms.create(180, 500, 'ground');
    platforms.create(360, 420, 'ground');
    platforms.create(540, 340, 'ground');
    platforms.create(700, 260, 'ground');

    player = this.physics.add.sprite(80, 450, 'dude');
    player.setBounce(0.1);
    player.setCollideWorldBounds(true);

    this.physics.add.collider(player, platforms);

    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    stars = this.physics.add.group();
    addStar.call(this, 180, 0);
    addStar.call(this, 360, 0);
    addStar.call(this, 540, 0);
    addStar.call(this, 700, 0);

    gems = this.physics.add.group();
    addGem.call(this, 270, 0);
    addGem.call(this, 450, 0);

    spikes = this.physics.add.staticGroup();
    spikes.create(300, 540, 'bomb').setScale(1.0).refreshBody();
    spikes.create(500, 540, 'bomb').setScale(1.0).refreshBody();

    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(gems, platforms);

    this.physics.add.overlap(player, stars, collectStar, null, this);
    this.physics.add.overlap(player, gems, collectGem, null, this);
    this.physics.add.collider(player, spikes, hitSpike, null, this);

    scoreText = this.add.text(16, 16, 'Score: 0', {
        fontSize: '32px',
        fill: '#000'
    });

    messageText = this.add.text(250, 16, '', {
        fontSize: '28px',
        fill: '#000'
    });
}

function update ()
{
    if (gameOver)
    {
        return;
    }

    if (cursors.left.isDown)
    {
        player.setVelocityX(-160);
        player.anims.play('left', true);
    }
    else if (cursors.right.isDown)
    {
        player.setVelocityX(160);
        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    if (Phaser.Input.Keyboard.JustDown(spaceKey) && player.body.touching.down)
    {
        player.setVelocityY(-350);
    }
}

function addStar(x, y)
{
    var star = stars.create(x, y, 'star');
    star.setBounceY(Phaser.Math.FloatBetween(0.2, 0.6));
    star.body.setGravityY(Phaser.Math.Between(20, 120));
}

function addGem(x, y)
{
    var gem = gems.create(x, y, 'star');
    gem.setTint(0x00ff99);
    gem.setScale(0.9);
    gem.setBounceY(0.5);
    gem.body.setGravityY(Phaser.Math.Between(40, 120));
}

function collectStar(player, star)
{
    star.disableBody(true, true);
    score += 10;
    scoreText.setText('Score: ' + score);
    checkWin();
}

function collectGem(player, gem)
{
    gem.disableBody(true, true);
    score += 25;
    scoreText.setText('Score: ' + score);
    checkWin();
}

function hitSpike(player, spike)
{
    score -= 15;
    if (score < 0)
    {
        score = 0;
    }

    scoreText.setText('Score: ' + score);

    player.setTint(0xff0000);
    player.setPosition(80, 450);
    player.setVelocity(0, 0);
    messageText.setText('Spike hit!');

    this.time.delayedCall(400, function () {
        player.clearTint();
        messageText.setText('');
    });
}

function checkWin()
{
    if (stars.countActive(true) === 0 && gems.countActive(true) === 0)
    {
        messageText.setText('You Win!');
        gameOver = true;
    }
}
</script>

</body>
</html>
